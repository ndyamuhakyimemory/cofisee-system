<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="COFISEE Loans Management">
    <title>Loans - COFISEE Microfinance System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to main content</a>

    <header role="banner">
        <h1>COFISEE Microfinance System</h1>
        <p>Loan Management</p>
    </header>

    <nav role="navigation" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="dashboard.php">Dashboard</a>
        <a href="members.html">Members</a>
        <a href="loans.html" aria-current="page">Loans</a>
    </nav>

    <main id="main" class="container" role="main">
        <div class="card">
            <h2>Disbursement Loan</h2>
            
            <form action="loans.php" method="POST" id="loanForm">
                <div class="form-group">
                    <label for="member_id">Member ID</label>
                    <input 
                        type="number" 
                        id="member_id" 
                        name="member_id" 
                        placeholder="Enter member ID" 
                        required
                        min="1"
                    >
                </div>
                
                <div class="form-group">
                    <label for="amount">Loan Amount (UGX)</label>
                    <input 
                        type="number" 
                        id="amount" 
                        name="amount" 
                        placeholder="Enter loan amount" 
                        required
                        min="0"
                        step="1000"
                    >
                </div>
                
                <div class="form-group">
                    <label for="interest_rate">Interest Rate (%)</label>
                    <input 
                        type="number" 
                        id="interest_rate" 
                        name="interest_rate" 
                        placeholder="Enter interest rate" 
                        required
                        min="0"
                        max="100"
                        step="0.5"
                    >
                </div>
                
                <button type="submit">Disburse Loan</button>
            </form>
        </div>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 COFISEE Microfinance System. All rights reserved.</p>
    </footer>
</body>
</html>
